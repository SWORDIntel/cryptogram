# GT Routing Rules for IPX/Hub STP
# Hub routes traffic between multiple PLMNs

# Home PLMN (0.1.x, +441)
  as as-to-home-primary 0.1.1 2905 m3ua
   asp asp-home-1
   routing-key 0 0.1.1
  as as-to-home-secondary 0.1.2 2905 m3ua
   asp asp-home-2
   routing-key 0 0.1.2

# Visited PLMN (0.2.x, +338)
  as as-to-visit 0.2.1 2905 m3ua
   asp asp-visit-1
   routing-key 0 0.2.1

# Threat Lab (0.8.x, +997) - Usually blocked, but in lab we route for honeypot
  as as-to-threat 0.8.1 2905 m3ua
   asp asp-threat-1
   routing-key 0 0.8.1

# GT-based routing decisions
# +441* -> 0.1.1 or 0.1.2 (load balance or failover)
# +338* -> 0.2.1
# +997* -> Route to honeypot or block

# Misconfiguration scenarios (for testing):
# - Misconfigure +441 to route to 0.2.1 (wrong PLMN)
# - Misconfigure to accept +997 traffic without screening
# - Load balance incorrectly causing routing loops
