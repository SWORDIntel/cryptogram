# SS7 Firewall Rules for Home PLMN STP-2 (Intentionally Relaxed for Testing)
# This STP is configured with weaker rules to simulate misconfiguration
# Used in failover scenarios to test if attackers exploit the difference

# Minimal blocking - only obvious attacks
BLOCK OPC=0.8.* DPC=0.1.10 OPCODE=MAP-DSR REASON="Critical: Delete subscriber data"

# Everything else is allowed with logging only
LOG OPC=* DPC=* OPCODE=*

# Note: This STP is intentionally vulnerable for red team testing
# In real scenarios, both STPs should have identical, strict policies
