# GT Routing Rules for Home PLMN STP
# Format: Global Title pattern -> Next Hop

# Home PLMN routing (0.1.x PCs, +441 GTs)
  as as-home-hlr 0.1.10 2905 m3ua
   asp asp-home-hlr
   routing-key 0 0.1.10
  as as-home-msc 0.1.20 2905 m3ua
   asp asp-home-msc
   routing-key 0 0.1.20
  as as-home-smsc 0.1.30 2905 m3ua
   asp asp-home-smsc
   routing-key 0 0.1.30
  as as-home-gmsc 0.1.40 2905 m3ua
   asp asp-home-gmsc
   routing-key 0 0.1.40

# IPX uplink (route everything else via IPX)
  as as-ipx-primary 0.9.1 2905 m3ua
   asp asp-ipx-1
   routing-key 0 0.9.1
  as as-ipx-secondary 0.9.2 2905 m3ua
   asp asp-ipx-2
   routing-key 0 0.9.2

# GT-based routing for MAP queries
# +441xxx -> Home HLR (0.1.10)
# +338xxx -> Route via IPX to Visited PLMN
# +997xxx -> Block (known rogue range) or route to honeypot

# Note: Actual GT routing uses SCCP subsystem
# This is simplified for lab purposes
