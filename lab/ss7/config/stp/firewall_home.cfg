# SS7 Firewall Rules for Home PLMN STP
# Format: ACTION CONDITION [PARAMETERS]
#
# Actions: ALLOW, BLOCK, LOG, ALERT, HONEYPOT
# Conditions: OPC, DPC, GT, OPCODE, IMSI, MSISDN

# Block known malicious ranges
BLOCK OPC=0.8.* DPC=0.1.10 OPCODE=MAP-ATI REASON="Suspicious location query from threat range"
BLOCK OPC=0.8.* DPC=0.1.10 OPCODE=MAP-PSI REASON="Subscriber info request from untrusted source"
BLOCK GT=997* REASON="Rogue operator range"

# Rate limiting (not implemented in basic version, but documented)
# RATELIMIT OPC=* DPC=0.1.10 RATE=10/minute OPCODE=MAP-ATI

# Honeypot mode - log but allow (for threat intel gathering)
HONEYPOT OPC=0.8.1 DPC=0.1.10 OPCODE=* REASON="Attacker 1 - collect intel"
HONEYPOT OPC=0.8.2 DPC=0.1.10 OPCODE=* REASON="Attacker 2 - collect intel"

# Alert on sensitive operations
ALERT DPC=0.1.10 OPCODE=MAP-ISD SEVERITY=HIGH REASON="Insert subscriber data attempt"
ALERT DPC=0.1.10 OPCODE=MAP-DSR SEVERITY=CRITICAL REASON="Delete subscriber data attempt"

# Allow legitimate roaming queries from known operators
ALLOW OPC=0.2.* DPC=0.1.10 OPCODE=MAP-UL REASON="Roaming update location from Visited PLMN"
ALLOW OPC=0.2.* DPC=0.1.10 OPCODE=MAP-SRI-SM REASON="SMS routing query from Visited PLMN"

# Default: Log all other traffic
LOG OPC=* DPC=* OPCODE=*
