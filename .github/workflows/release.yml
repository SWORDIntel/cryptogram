---
name: Release Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  # ============================================================================
  # Android APK Release Build
  # ============================================================================
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clone Android source
        run: |
          git clone --depth 1 https://github.com/SWORDIntel/cryptogram-android.git telegram-android || true
          if [ ! -d telegram-android ]; then
            git clone --depth 1 https://github.com/SWORDIntel/cryptogram.git telegram-android
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" > /dev/null 2>&1 || true
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Install Android NDK and CMake
        run: |
          sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: android-gradle-

      - name: Grant execute permission
        run: chmod +x telegram-android/gradlew

      - name: Build Debug APK
        run: |
          cd telegram-android
          ./gradlew assembleAfatDebug --stacktrace --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build Release APK
        run: |
          cd telegram-android
          ./gradlew assembleAfatRelease --stacktrace --no-daemon
        continue-on-error: true
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Collect APKs
        id: collect-apk
        run: |
          mkdir -p artifacts/android
          find telegram-android/TMessagesProj*/build/outputs/apk -name "*.apk" -type f -exec cp {} artifacts/android/ \; || true
          ls -lh artifacts/android/ || true

          DEBUG_APK=$(find artifacts/android -name "*debug*.apk" | head -1)
          RELEASE_APK=$(find artifacts/android -name "*release*.apk" | head -1)
          echo "debug_apk=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "release_apk=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-android-apks
          path: artifacts/android/
          retention-days: 30

      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/android/*.apk
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Debian Linux Desktop Release Build
  # ============================================================================
  debian:
    name: Debian Linux Desktop
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies
        run: |
          sudo apt-get update || true
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --fix-broken \
            build-essential git pkg-config \
            qt6-base-dev qt6-base-private-dev qt6-tools-dev qt6-tools-dev-tools \
            qt6-image-formats-plugins qt6-l10n-tools qt6-declarative-dev \
            libssl-dev libopenal-dev libpulse-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev \
            libglib2.0-dev libdbus-1-dev libx11-dev \
            libxrandr-dev libxi-dev \
            python3-dev python3-pip \
            yasm nasm ccache ninja-build \
            cmake dh-make dpkg-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libopus-dev libvpx-dev libwebp-dev libjpeg-dev zlib1g-dev \
            libboost-dev libboost-regex-dev \
            libasound2-dev libxi-dev libxtst-dev \
            libdav1d-dev libxxhash-dev \
            libcmark-dev 2>/dev/null || true
          sudo apt-get install -y --fix-broken 2>/dev/null || true

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade grpcio grpcio-tools cryptography pyyaml requests sqlalchemy protobuf

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-debian-${{ github.sha }}
          restore-keys: ccache-debian-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache -z

      - name: Build CRYPTOGRAM Desktop
        run: |
          BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
          export BUILD_TYPE
          export JOBS=$(nproc)
          export CCACHE_DIR=~/.ccache

          chmod +x build_linux.sh
          ./build_linux.sh

          ccache -s

      - name: Locate binary
        id: locate-binary
        run: |
          BINARY=""
          for candidate in \
            build_release/bin/Telegram \
            build_Release/bin/Telegram \
            build_release/Telegram \
            build_Release/Telegram \
            out/Release/Telegram \
            out/Debug/Telegram; do
            if [ -f "$candidate" ]; then
              BINARY="$candidate"
              break
            fi
          done

          if [ -z "$BINARY" ]; then
            echo "Searching for Telegram binary..."
            find . -name "Telegram" -type f -executable 2>/dev/null | head -5
            BINARY=$(find . -name "Telegram" -type f -executable 2>/dev/null | head -1)
          fi

          if [ -z "$BINARY" ]; then
            echo "No binary found — build may have produced output elsewhere"
            find . -maxdepth 4 -name "Telegram" -o -name "cryptogram" 2>/dev/null | head -10
            echo "binary_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "binary=$BINARY" >> $GITHUB_OUTPUT
          echo "binary_found=true" >> $GITHUB_OUTPUT
          echo "Found binary: $BINARY"

      - name: Create .deb package
        if: steps.locate-binary.outputs.binary_found == 'true'
        run: |
          BINARY="${{ steps.locate-binary.outputs.binary }}"
          VERSION=$(grep -oP 'AppVersion \K\S+' Telegram/build/version || echo "1.0.0")
          ARCH=$(dpkg --print-architecture)

          mkdir -p artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/bin
          mkdir -p artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/share/applications
          mkdir -p artifacts/debian/cryptogram_${VERSION}_${ARCH}/DEBIAN

          cp "$BINARY" artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/bin/cryptogram
          chmod +x artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/bin/cryptogram

          # Create desktop entry
          cat > artifacts/debian/cryptogram_${VERSION}_${ARCH}/usr/local/share/applications/cryptogram.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=CRYPTOGRAM
          Comment=Secure Messaging Application
          Exec=/usr/local/bin/cryptogram
          Type=Application
          Categories=Network;InstantMessaging;Security;
          Terminal=false
          DESKTOP

          # Create control file
          cat > artifacts/debian/cryptogram_${VERSION}_${ARCH}/DEBIAN/control << CONTROL
          Package: cryptogram
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: CRYPTOGRAM <noreply@cryptogram.dev>
          Description: CRYPTOGRAM Secure Messaging Client
           CRYPTOGRAM is a military-grade secure messaging application
           with Signal Protocol, MLS, voice morphing, surveillance
           detection, and Tor integration.
          Depends: libqt6-core6, libqt6-gui6, libqt6-widgets6, libssl3, libopenal1, libpulse0
          Section: net
          Priority: optional
          CONTROL

          # Build .deb
          cd artifacts/debian
          dpkg-deb --build cryptogram_${VERSION}_${ARCH}
          ls -lh *.deb

      - name: Upload Debian artifact
        if: steps.locate-binary.outputs.binary_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-debian-package
          path: artifacts/debian/*.deb
          retention-days: 30

      - name: Upload .deb to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.locate-binary.outputs.binary_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/debian/*.deb
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # macOS Desktop Release Build
  # ============================================================================
  macos:
    name: macOS Desktop
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies
        run: |
          brew install qt6 cmake ninja nasm meson pkg-config automake libtool wget gnu-tar

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install grpcio grpcio-tools cryptography pyyaml requests sqlalchemy protobuf

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: ccache-macos-${{ github.sha }}
          restore-keys: ccache-macos-

      - name: Configure ccache
        run: |
          brew install ccache 2>/dev/null || true
          ccache --set-config=max_size=2G
          ccache --set-config=compression=true
          ccache -z

      - name: Build CRYPTOGRAM Desktop
        run: |
          export BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
          export JOBS=$(sysctl -n hw.ncpu)
          export CMAKE_PREFIX_PATH="$(brew --prefix qt6)"
          export CRYPTOGRAM_ROOT="$GITHUB_WORKSPACE"

          chmod +x build_mac.sh
          ./build_mac.sh

          ccache -s

      - name: Locate artifacts
        id: locate-artifacts
        run: |
          DMG=""
          APP_BUNDLE=""

          # Find DMG
          for candidate in \
            build_release/*.dmg \
            build_Release/*.dmg \
            out/Release/*.dmg; do
            if [ -f "$candidate" ]; then
              DMG="$candidate"
              break
            fi
          done

          if [ -z "$DMG" ]; then
            DMG=$(find . -maxdepth 4 -name "cryptogram*.dmg" -type f 2>/dev/null | head -1)
          fi

          # Find .app bundle
          APP_BUNDLE=$(find . -maxdepth 4 -name "Cryptogram.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            APP_BUNDLE=$(find . -maxdepth 4 -name "Telegram.app" -type d 2>/dev/null | head -1)
          fi

          mkdir -p artifacts/macos

          if [ -n "$DMG" ]; then
            cp "$DMG" artifacts/macos/
            echo "dmg=$(basename $DMG)" >> $GITHUB_OUTPUT
            echo "artifacts_found=true" >> $GITHUB_OUTPUT
            echo "Found DMG: $DMG"
          elif [ -n "$APP_BUNDLE" ]; then
            # Zip the .app bundle as fallback
            cd "$(dirname "$APP_BUNDLE")"
            zip -r "$GITHUB_WORKSPACE/artifacts/macos/cryptogram-desktop-macos.zip" "$(basename "$APP_BUNDLE")"
            cd "$GITHUB_WORKSPACE"
            echo "dmg=" >> $GITHUB_OUTPUT
            echo "artifacts_found=true" >> $GITHUB_OUTPUT
            echo "No DMG found, zipped .app bundle"
          else
            echo "No artifacts found"
            echo "artifacts_found=false" >> $GITHUB_OUTPUT
            # List what we got
            find . -maxdepth 5 \( -name "*.app" -o -name "*.dmg" -o -name "cryptogram*" \) 2>/dev/null | head -20
          fi

      - name: Upload macOS artifacts
        if: steps.locate-artifacts.outputs.artifacts_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-macos
          path: artifacts/macos/
          retention-days: 30

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.locate-artifacts.outputs.artifacts_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/macos/*
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Windows Desktop Release Build
  # ============================================================================
  windows:
    name: Windows Desktop
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Qt6 via aqtinstall
        run: |
          pip install aqtinstall
          aqt install-qt windows desktop 6.7.3 win64_msvc2022_64 -m qt_imageformats qt_multimedia qt_declarative
          echo "QT_DIR=$PWD\Qt\6.7.3\msvc2022_64" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$PWD\Qt\6.7.3\msvc2022_64" >> $GITHUB_ENV

      - name: Install NuGet CLI
        run: |
          choco install nuget.commandline -y
          echo "NUGET_EXE=C:\\Program Files\\NuGet\\nuget.exe" >> $GITHUB_ENV

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-${{ github.sha }}
          restore-keys: vcpkg-windows-

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows `
            openssl:x64-windows `
            openal-soft:x64-windows `
            ffmpeg:x64-windows `
            zlib:x64-windows `
            libjpeg-turbo:x64-windows `
            libwebp:x64-windows `
            libvpx:x64-windows `
            x264:x64-windows `
            x265:x64-windows `
            openh264:x64-windows `
            rnnoise:x64-windows `
            cmark:x64-windows `
            boost-regex:x64-windows `
            lcms:x64-windows `
            dav1d:x64-windows `
            xxhash:x64-windows `
            expected-lite:x64-windows `
            range-v3:x64-windows `
            tg-owt:x64-windows 2>&1 || true
          echo "VCPKG_INSTALLED_DIR=C:\\vcpkg\\installed" >> $GITHUB_ENV

      - name: Build CRYPTOGRAM Desktop
        run: |
          $env:BUILD_TYPE = "${{ github.event.inputs.build_type || 'release' }}"
          $env:TDESKTOP_API_ID = "17349"
          $env:TDESKTOP_API_HASH = "344583e45741c457fe1862106095a5eb"
          powershell -ExecutionPolicy Bypass -File build_windows.ps1 -BuildType "Release" -ApiId "17349" -ApiHash "344583e45741c457fe1862106095a5eb"

      - name: Locate artifacts
        id: locate-artifacts
        run: |
          $artifactsFound = "false"
          $zipFile = Get-ChildItem -Path artifacts\windows -Filter "*.zip" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($zipFile) {
            echo "zip=$($zipFile.FullName)" >> $env:GITHUB_OUTPUT
            $artifactsFound = "true"
          } else {
            # Search for exe
            $exe = Get-ChildItem -Path out -Recurse -Filter "Cryptogram.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $exe) {
              $exe = Get-ChildItem -Path out -Recurse -Filter "Telegram.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            }
            if ($exe) {
              New-Item -ItemType Directory -Path artifacts\windows -Force | Out-Null
              Compress-Archive -Path $exe.FullName -DestinationPath "artifacts\windows\cryptogram-windows-x64.zip"
              echo "zip=artifacts\windows\cryptogram-windows-x64.zip" >> $env:GITHUB_OUTPUT
              $artifactsFound = "true"
            }
          }
          echo "artifacts_found=$artifactsFound" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifacts
        if: steps.locate-artifacts.outputs.artifacts_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cryptogram-windows
          path: artifacts/windows/
          retention-days: 30

      - name: Upload ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.locate-artifacts.outputs.artifacts_found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/windows/*
          draft: true
          name: CRYPTOGRAM ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Build Summary
  # ============================================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [android, debian, macos, windows]
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "## CRYPTOGRAM Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status | Artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android APK | ${{ needs.android.result }} | [cryptogram-android-apks](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Debian Package | ${{ needs.debian.result }} | [cryptogram-debian-package](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS Desktop | ${{ needs.macos.result }} | [cryptogram-macos](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows Desktop | ${{ needs.windows.result }} | [cryptogram-windows](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Trigger" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
